<!doctype html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>CYBERNET • Feed</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Orbitron:wght@500;600;700&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />

  <link rel="stylesheet" href="css/base.css" />
  <link rel="stylesheet" href="css/themes.css" />
  <link rel="stylesheet" href="css/components.css" />
  <link rel="stylesheet" href="css/layout.css" />
  <link rel="stylesheet" href="css/pages.css" />
</head>

<body class="app">
  <div class="app-bg">
    <div class="grid-lines"></div>
    <div class="glow g1"></div>
    <div class="glow g2"></div>
    <div class="glow g3"></div>
  </div>

  <header class="topbar glass">
    <button class="icon-btn only-mobile" data-action="toggleSidebar" aria-label="Open navigation">
      <i class="fa-solid fa-bars"></i>
    </button>

    <a class="topbar-brand" href="feed.html">
      <span class="logo-badge small"><i class="fa-solid fa-shield-halved"></i></span>
      <span class="brand-name">CYBERNET</span>
    </a>

    <div class="topbar-search">
      <div class="input icon-left">
        <i class="fa-solid fa-magnifying-glass"></i>
        <input id="globalSearch" type="text" placeholder="Search people, tags, TTPs…" />
      </div>
    </div>

    <div class="topbar-actions">
      <button class="icon-btn" data-action="toggleRightPanel" aria-label="Open panels">
        <i class="fa-regular fa-window-maximize"></i>
      </button>
      <button class="icon-btn" data-action="openNotifications" aria-label="Notifications">
        <i class="fa-regular fa-bell"></i>
        <span class="badge" id="notifBadge">3</span>
      </button>
      <a class="avatar-btn" href="profile.html" title="Profile">
        <img src="https://i.pravatar.cc/80?img=12" alt="Me" />
        <span class="presence online"></span>
      </a>
    </div>
  </header>

  <div class="app-shell">
    <!-- Sidebar -->
    <aside class="sidebar glass" id="sidebar">
      <nav class="nav">
        <a class="nav-item active" href="feed.html"><i class="fa-solid fa-house"></i><span>Home</span></a>
        <a class="nav-item" href="explore.html"><i class="fa-solid fa-compass"></i><span>Explore</span></a>
        <a class="nav-item" href="notifications.html"><i class="fa-solid fa-bell"></i><span>Notifications</span></a>
        <a class="nav-item" href="messages.html"><i class="fa-solid fa-message"></i><span>Messages</span></a>
        <a class="nav-item" href="profile.html"><i class="fa-solid fa-user"></i><span>Profile</span></a>
        <a class="nav-item" href="#"><i class="fa-solid fa-bookmark"></i><span>Bookmarks</span></a>
        <a class="nav-item" href="settings.html"><i class="fa-solid fa-gear"></i><span>Settings</span></a>
      </nav>

      <div class="sidebar-footer">
        <button class="btn btn--primary btn--wide" data-action="openComposer">
          <i class="fa-solid fa-pen"></i><span>New Post</span>
        </button>
        <div class="mini-profile glass">
          <img class="mini-avatar" src="https://i.pravatar.cc/80?img=12" alt="Avatar" />
          <div class="mini-meta">
            <div class="mini-name">Farid P.</div>
            <div class="mini-handle">@blue.team.ops</div>
          </div>
          <button class="icon-btn" title="Logout" onclick="window.location.href='index.html'">
            <i class="fa-solid fa-right-from-bracket"></i>
          </button>
        </div>
      </div>
    </aside>

    <!-- Main -->
    <main class="main">
      <!-- Stories -->
      <section class="stories glass">
        <div class="stories-title">
          <i class="fa-solid fa-bolt"></i>
          <span>Status Signals</span>
        </div>
        <div class="stories-row" id="storiesRow"></div>
      </section>

      <!-- Composer -->
      <section class="composer glass" id="composer">
        <div class="row row--between">
          <div class="row gap-10">
            <img class="avatar" src="https://i.pravatar.cc/80?img=12" alt="Avatar" />
            <div>
              <div class="muted">Post to</div>
              <div class="row gap-8">
                <span class="chip chip--small"><i class="fa-solid fa-lock"></i> Network</span>
                <span class="chip chip--small"><i class="fa-solid fa-tags"></i> #threat-intel</span>
              </div>
            </div>
          </div>
          <button class="icon-btn" data-action="closeComposer" aria-label="Close composer">
            <i class="fa-solid fa-xmark"></i>
          </button>
        </div>

        <textarea id="composerText" class="textarea" rows="3" placeholder="Share a detection idea, IOC, playbook tip…"></textarea>

        <div class="row row--between mt-10">
          <div class="row gap-8">
            <button class="icon-btn" title="Attach image" onclick="toast('Attach image (demo)')"><i class="fa-regular fa-image"></i></button>
            <button class="icon-btn" title="Add tag" onclick="toast('Add tag (demo)')"><i class="fa-solid fa-hashtag"></i></button>
            <button class="icon-btn" title="Poll" onclick="toast('Poll (demo)')"><i class="fa-solid fa-square-poll-vertical"></i></button>
          </div>
          <button class="btn btn--primary" id="postBtn">
            <i class="fa-solid fa-paper-plane"></i><span>Post</span>
          </button>
        </div>
      </section>

      <!-- Feed -->
      <section class="feed" id="feed"></section>
    </main>

    <!-- Right Panel -->
    <aside class="right-panel" id="rightPanel">
      <section class="panel glass">
        <header class="panel-header">
          <h3>Trending</h3>
          <button class="icon-btn only-mobile" data-action="toggleRightPanel" aria-label="Close panels">
            <i class="fa-solid fa-xmark"></i>
          </button>
        </header>
        <div class="panel-body" id="trends"></div>
      </section>

      <section class="panel glass">
        <header class="panel-header">
          <h3>Suggested</h3>
        </header>
        <div class="panel-body" id="suggested"></div>
      </section>

      <section class="panel glass" id="notifPanel">
        <header class="panel-header">
          <h3>Alerts</h3>
          <button class="btn btn--ghost btn--small" data-action="markAllRead">
            <i class="fa-solid fa-check"></i><span>Mark read</span>
          </button>
        </header>
        <div class="panel-body" id="notificationsPreview"></div>
      </section>
    </aside>
  </div>

  <!-- Toast -->
  <div class="toast" id="toast" role="status" aria-live="polite"></div>

  <script src="js/data.js"></script>
  <script src="js/ui.js"></script>
  <script src="js/app.js"></script>
  <script src="js/feed.js"></script>
</body>
</html>
